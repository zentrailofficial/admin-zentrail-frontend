trigger:
  branches:
    include:
      - main

pool:
  name: zentrail-agent

stages:
  - stage: Dev
    displayName: 'Deploy to Development'
    jobs:
      - job: DeployDev
        displayName: 'Deploy to Vercel - Dev'
        variables:
          VERCEL_PROJECT_ID: 'prj_tigHXxySKZsgJJnBwQX4XhkJuDNW'
          VERCEL_ORG_ID: 'gPLVlvJxaFI0eeU4D9A2btu2'
          VERCEL_TOKEN: 'ARyuWAO6SJoPOyVWycwuqALp'
        steps:
          
          
          - script: |
              vercel pull --yes --environment=production --token ARyuWAO6SJoPOyVWycwuqALp
            displayName: 'Pull Vercel environment variables'

          - script: |
              vercel deploy --prod --token ARyuWAO6SJoPOyVWycwuqALp
            displayName: 'Deploy to Vercel (production)'

  - stage: Prod
    displayName: 'Deploy to Production'
    dependsOn: Dev
    condition: succeeded()
    jobs:
      - deployment: DeployProd
        environment: Production   # Requires manual approval in Azure DevOps
        displayName: 'Deploy to Vercel - Prod'
        variables:
                VERCEL_PROJECT_ID: 'prj_7XqBuF9ZTF864kcdKH24vxlOlAV7'
                VERCEL_ORG_ID: 'gPLVlvJxaFI0eeU4D9A2btu2'
                VERCEL_TOKEN: 'ARyuWAO6SJoPOyVWycwuqALp'

        strategy:
          runOnce:
            deploy:
             
              steps:
                               
                - script: |
                    vercel pull --yes --environment=production --token ARyuWAO6SJoPOyVWycwuqALp
                  displayName: 'Pull Vercel environment variables'

                - script: |
                    vercel deploy --prod --token ARyuWAO6SJoPOyVWycwuqALp
                  displayName: 'Deploy to Vercel (production)'

            
            