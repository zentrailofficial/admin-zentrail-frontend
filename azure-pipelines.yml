trigger:
  branches:
    include:
      - main

pool:
  name: frontend-agent

stages:

  # -----------------------------------
  # DEV DEPLOY
  # -----------------------------------
  - stage: Dev
    displayName: "Deploy to Development"
    jobs:
      - job: DeployDev
        displayName: "Deploy to Vercel - Dev"
        variables:
          VERCEL_PROJECT_ID: "prj_3mQxDMteCu8ZiAYaaSbfZiIt1h7I"
          VERCEL_ORG_ID: "pLaaeNUr4hvZsPrncH6UXOAh"
          VERCEL_TOKEN: "vcp_7WpT4cn2APguKxKQLfjJWsejqCqB7ZsxCggnwzOuUXv9gFih170zwbFn"

        steps:

          # Install Vercel CLI
          - script: |
              npm install -g vercel@latest
            displayName: "Install Vercel CLI"

          # Remove existing .vercel folder
          - script: |
              if exist .vercel rmdir /s /q .vercel
            displayName: "Remove existing .vercel folder"

          # Link Vercel project
          - script: |
              vercel link --yes
            displayName: "Link Vercel Project"
            env:
              VERCEL_TOKEN: $(VERCEL_TOKEN)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
              VERCEL_ORG_ID: $(VERCEL_ORG_ID)

          # Pull environment variables
          - script: |
              vercel env pull .env.production --yes
            displayName: "Pull Vercel environment variables"
            env:
              VERCEL_TOKEN: $(VERCEL_TOKEN)

          # Deploy
          - script: |
              vercel deploy --prod --yes
            displayName: "Deploy to Vercel (production)"
            env:
              VERCEL_TOKEN: $(VERCEL_TOKEN)


  # -----------------------------------
  # PROD DEPLOY
  # -----------------------------------
  - stage: Prod
    displayName: "Deploy to Production"
    dependsOn: Dev
    condition: succeeded()
    jobs:
      - deployment: DeployProd
        environment: Production
        displayName: "Deploy to Vercel - Prod"
        variables:
          VERCEL_PROJECT_ID: "prj_NulMSFoh456Dyr54KmAUlTMXcm1C"
          VERCEL_ORG_ID: "pLaaeNUr4hvZsPrncH6UXOAh"
          VERCEL_TOKEN: "vcp_7WpT4cn2APguKxKQLfjJWsejqCqB7ZsxCggnwzOuUXv9gFih170zwbFn"

        strategy:
          runOnce:
            deploy:
              steps:

                # Install Vercel CLI
                - script: |
                    npm install -g vercel@latest
                  displayName: "Install Vercel CLI"

                # Remove old .vercel
                - script: |
                    if exist .vercel rmdir /s /q .vercel
                  displayName: "Remove existing .vercel folder"

                # Link project
                - script: |
                    vercel link --yes
                  displayName: "Link Vercel Project"
                  env:
                    VERCEL_TOKEN: $(VERCEL_TOKEN)
                    VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
                    VERCEL_ORG_ID: $(VERCEL_ORG_ID)

                # Pull env vars
                - script: |
                    vercel env pull .env.production --yes
                  displayName: "Pull Vercel environment variables"
                  env:
                    VERCEL_TOKEN: $(VERCEL_TOKEN)

                # Deploy to production
                - script: |
                    vercel deploy --prod --yes
                  displayName: "Deploy to Vercel (production)"
                  env:
                    VERCEL_TOKEN: $(VERCEL_TOKEN)
